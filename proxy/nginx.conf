# ラーメン図鑑 (ramen-guide) — リバースプロキシ（TLS 終端）
#
# プロキシで HTTPS(:443) を終端し、パスでバックエンド／フロントエンドへ振り分ける。
#   /api/    … バックエンド (ASP.NET Core)
#   /swagger … バックエンド (開発時の API ドキュメント)
#   それ以外  … フロントエンド (nginx + SPA)
#
# 同一オリジン(https://localhost)に集約するため CORS は不要。
# プロキシ→backend 間は内部ネットワークの http だが、X-Forwarded-Proto: https を伝えることで
# backend 側が「HTTPS リクエスト」と認識し、Cookie に Secure 属性を付与する。

# --- HTTP(:80) は HTTPS へリダイレクト ---
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# --- HTTPS(:443): TLS 終端 + ルーティング ---
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # 証明書はエントリポイントが自己署名で生成（本番は実証明書をマウントして上書き）。
    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # アップロードサイズの上限（店舗画像など。必要に応じて調整）。
    client_max_body_size 10m;

    # プロキシ共通ヘッダ。backend 側の ForwardedHeaders ミドルウェアが
    # X-Forwarded-For / X-Forwarded-Proto を解釈し、実クライアント IP と
    # スキーム（https）を復元する（レート制限・Cookie Secure 判定に必要）。
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # API リクエストはバックエンドへ。
    location /api/ {
        proxy_pass http://backend:8080;
    }

    # Swagger UI（開発環境のみ backend 側で有効）もバックエンドへ。
    location /swagger {
        proxy_pass http://backend:8080;
    }

    # それ以外はフロントエンド（静的 SPA）へ。
    # SPA のルーティングフォールバック（try_files → index.html）は frontend 側の
    # nginx.conf が担うため、ここではそのまま委譲するだけでよい。
    location / {
        proxy_pass http://frontend:80;
    }
}
