<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- 背景: 温かみのある赤の角丸 -->
  <rect width="64" height="64" rx="14" fill="#E0492F"/>

  <!-- 湯気 -->
  <g stroke="#FFE9DD" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M25 16c-2.4-2.4-2.4-4.8 0-7.2"/>
    <path d="M33 14.5c-2.4-2.4-2.4-4.8 0-7.2"/>
    <path d="M41 16c-2.4-2.4-2.4-4.8 0-7.2"/>
  </g>

  <!-- 箸 -->
  <g stroke="#3A2418" stroke-width="2.6" stroke-linecap="round">
    <path d="M40 19 54 12"/>
    <path d="M42 24 56 17"/>
  </g>

  <!-- 丼本体 -->
  <path d="M9 30h46c0 13.3-10.3 23-23 23S9 43.3 9 30Z" fill="#FFF7EC"/>
  <!-- 丼のフチ -->
  <rect x="6.5" y="27" width="51" height="6.5" rx="3.25" fill="#F4C04E"/>

  <!-- スープ面 -->
  <ellipse cx="32" cy="33" rx="20" ry="5.2" fill="#F2A93B"/>

  <!-- ナルト（うずまき） -->
  <g>
    <circle cx="24" cy="33" r="5" fill="#FFFFFF"/>
    <path d="M24 33 a2.6 2.6 0 1 1 2.4-3.6" stroke="#E86A8E" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 味玉 -->
  <ellipse cx="38" cy="33" rx="5.4" ry="4.6" fill="#FFE7A8"/>
  <ellipse cx="38" cy="33.4" rx="2.6" ry="2.2" fill="#F08A2E"/>

  <!-- 海苔 -->
  <rect x="44.5" y="28" width="6" height="9" rx="1" fill="#2C3A2E" transform="rotate(8 47.5 32.5)"/>

  <!-- ねぎ -->
  <g fill="#5Fae3f">
    <circle cx="17.5" cy="31.8" r="1.3"/>
    <circle cx="31" cy="30.6" r="1.3"/>
    <circle cx="45" cy="31" r="1.2" fill="#6FBF4A"/>
  </g>
</svg>
